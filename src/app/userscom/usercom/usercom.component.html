<div class="container-fluid">
  <div class="container">
    <p class="fs-3 search-text1 text-center">Cadastrar usuário</p>
    <p class="logo-corp text-center"><i class="fas fa-address-card"></i></p>
    <p class="description-txt text-center">
      Insira os valores nos campos com a informação correta
    </p>
  </div>
</div>

<div class="container form-container">
  <form class="row g-3">
    <div class="col-md-6">
      <label for="inputName" class="form-label">Nome</label>
      <input
        type="text"
        class="form-control"
        id="inputName"
        placeholder="Primeiro nome"
      />
    </div>
    <div class="col-md-6">
      <label for="inputSurName" class="form-label">Sobrenome</label>
      <input
        type="text"
        class="form-control"
        id="inputSurName"
        placeholder="Nome restante"
      />
    </div>
    <div class="col-md-6">
      <label for="inputAge" class="form-label">Data de nascimento</label>
      <input type="date" class="form-control" id="inputAge" />
    </div>
    <div class="col-md-6">
      <label for="inputCpf" class="form-label">CPF</label>
      <input
        type="text"
        class="form-control"
        id="inputCpf"
        placeholder="000.000.000-00"
      />
    </div>
    <div class="col-md-6">
      <label for="inputTel" class="form-label">Celular</label>
      <input
        type="tel"
        class="form-control"
        id="inputTel"
        placeholder="(00)000000000"
      />
    </div>
    <div class="col-md-6">
      <p class="sex-option">Gênero</p>
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="flexCheckDefault" />
        <label class="form-check-label" for="flexCheckDefault"> Homem </label>
      </div>
      <div class="form-check">
        <input
          class="form-check-input"
          type="checkbox"
          id="flexCheckChecked"
          checked
        />
        <label class="form-check-label" for="flexCheckChecked"> Mulher </label>
      </div>
    </div>
    <div class="col-md-6">
      <label for="inputLoginName" class="form-label">Login</label>
      <input
        type="text"
        class="form-control"
        id="inputLoginName"
        placeholder="Nome para logar"
      />
    </div>
    <div class="col-md-6">
      <label for="inputEmail" class="form-label">Email</label>
      <input
        type="email"
        class="form-control"
        id="inputEmail"
        placeholder="email@gmail.com"
      />
    </div>
    <div class="col-md-6">
      <label for="inputEmaiConfirm" class="form-label">Confirma email</label>
      <input
        type="email"
        class="form-control"
        id="inputEmaiConfirm"
        placeholder="email@gmail.com"
      />
    </div>
    <div class="col-md-6">
      <label for="inputPassword" class="form-label">Senha</label>
      <input
        type="password"
        class="form-control"
        id="inputPassword"
        placeholder="Máximo 12 caracteres"
        minlength="12"
      />
    </div>
    <div class="col-12"></div>
  </form>
  <div class="container-fluid text-center">
    <button type="submit" class="btn btn-primary myButton">Limpar</button>
    <button type="submit" class="btn btn-primary myButton">Cadastrar</button>
    <button type="submit" class="btn btn-primary myButton">Voltar</button>
  </div>
</div>

<div class="container-fluid">
  <div class="container">
    <p class="fs-3 search-text1 text-center">Cadastrar estabelecimento</p>
    <p class="logo-corp text-center"><i class="fas fa-store-alt"></i></p>
    <p class="description-txt text-center">
      Insira os valores nos campos com a informação correta
    </p>
  </div>
</div>

<div class="container form-container">
  <form class="row g-3">
    <div class="col-md-6">
      <label for="inputName" class="form-label">Nome</label>
      <input
        type="text"
        class="form-control"
        id="inputName"
        placeholder="Nome da loja"
        required
      />
    </div>
    <div class="col-md-6">
      <label for="inputSite" class="form-label">Site</label>
      <input
        type="url"
        class="form-control"
        id="inputSite"
        placeholder="www.loja.com.br"
        required
      />
    </div>
    <div class="col-md-6">
      <label for="inputStreet" class="form-label">Endereço</label>
      <input
        type="text"
        class="form-control"
        id="inputStreet"
        placeholder="Rua..."
        required
      />
    </div>
    <div class="col-md-6">
      <label for="inputNum" class="form-label">Número</label>
      <input
        type="number"
        class="form-control"
        id="inputNum"
        placeholder="0"
        min="1"
        required
      />
    </div>
    <div class="col-md-6">
      <label for="inputSite" class="form-label">CEP</label>
      <input
        type="text"
        class="form-control"
        id="inputCepf"
        placeholder="00000-000"
        required
      />
    </div>
    <div class="col-md-6">
      <label for="inputEmail" class="form-label">Email</label>
      <input
        type="email"
        class="form-control"
        id="inputEmail"
        placeholder="email@loja.com"
        required
      />
    </div>
    <div class="col-md-6">
      <label for="inputTel" class="form-label">Telefone</label>
      <input
        type="tel"
        class="form-control"
        id="inputTel"
        placeholder="(24)0000-0000"
        required
      />
    </div>
    <div class="col-md-6">
      <label for="inputCel" class="form-label">Celular</label>
      <input
        type="tel"
        class="form-control"
        id="inputCel"
        placeholder="(00)00000-0000"
        required
      />
    </div>
    <div class="col-md-6">
      <select class="form-select" aria-label="Bairro">
        <option selected>Bairro</option>
        <option value="Centro">Centro</option>
        <option value="Boa União">Boa União</option>
        <option value="Cidade Nova">Cidade Nova</option>
        <option value="Santa Terezinha">Santa Terezinha</option>
        <option value="Mirante Sul">Mirante Sul</option>
      </select>
    </div>
    <div class="col-md-6">
      <select class="form-select" aria-label="Cidade">
        <option selected>Cidade</option>
        <option value="Três Rios">Três Rios</option>
        <option value="Levy Gasparian">Levy Gasparian</option>
        <option value="Paraiba do Sul">Paraiba do Sul</option>
      </select>
    </div>
    <div class="col-md-6">
      <select class="form-select" aria-label="Estado">
        <option selected>Estado</option>
        <option value="Rio de Janeiro">Rio de Janeiro</option>
      </select>
    </div>
    <div class="col-md-6">
      <select class="form-select" aria-label="Categoria">
        <option selected>Categoria</option>
        <option value="Construção">Construção</option>
        <option value="Cama mesa e banho">Cama mesa e banho</option>
        <option value="Mercado">Mercado</option>
        <option value="Padaria">Padaria</option>
        <option value="Farmácia">Farmácia</option>
        <option value="Bar">Bar</option>
        <option value="Barbearia">Barbearia</option>
        <option value="Lanchonete">Lanchonete</option>
        <option value="Pet-shop">Pet-shop</option>
        <option value="Informática">Informática</option>
        <option value="Lanchonete">Lanchonete</option>
        <option value="Oficina">Oficina</option>
        <option value="Hotel">Hotel</option>
        <option value="1 e 99">1 e 99</option>
        <option value="floricultura">floricultura</option>
        <option value="Revendedora">Revendedora</option>
        <option value="Ferro velho">Ferro velho</option>
        <option value="Motel">Motel</option>
      </select>
    </div>
    <div class="col-md-12">
      <label for="inputSite" class="form-label">Insira a url da imagem</label>
      <input
        type="url"
        class="form-control"
        id="inputSite"
        placeholder="url imagem"
        required
      />
    </div>
    <div class="col-md-12">
      <label for="exampleFormControlTextarea1" class="form-label"
        >Descrição</label
      >
      <textarea
        class="form-control"
        id="exampleFormControlTextarea1"
        rows="4"
        placeholder="Minha loja oferece..."
        required
      ></textarea>
    </div>
    <div class="col-12"></div>
  </form>
  <div class="container-fluid text-center">
    <button type="button" class="btn btn-primary myButton">Limpar</button>
    <button type="submit" class="btn btn-primary myButton">Cadastrar</button>
    <button type="button" class="btn btn-primary myButton">Voltar</button>
  </div>
</div>
